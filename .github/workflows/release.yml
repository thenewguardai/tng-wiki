# Publishes to npm via OIDC trusted publishing - no tokens, no OTP.
# One-time setup on npmjs.com: package settings -> Trusted Publisher ->
# GitHub Actions -> repo thenewguardai/tng-wiki, workflow release.yml.
#
# Normal flow: `npm version minor` locally; the postversion hook pushes the
# v* tag and this workflow publishes it. workflow_dispatch exists for
# re-running a publish that failed (e.g. the tag predates this workflow).

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # OIDC credential for npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 bundles 10.x
      - run: npm install -g npm@latest

      - run: npm ci

      # prepublishOnly gates on the full test suite + smoke; provenance
      # attestation is generated automatically under trusted publishing
      - run: npm publish

  # Keep GitHub Releases in lockstep with npm: after a successful publish,
  # create the release for this tag with its CHANGELOG section as the notes.
  # Separate job so contents:write never coexists with the OIDC publish
  # credential. Idempotent - an existing release is left alone.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release from the CHANGELOG section
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Tag pushes name the tag directly; workflow_dispatch derives it
          # from package.json (the dispatch path exists for re-runs).
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then TAG="$REF_NAME"; else TAG="v$(node -p "require('./package.json').version")"; fi
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '$0 ~ "^## \\[" ver "\\]" {found=1; next} /^## \[/ {found=0} found' CHANGELOG.md > /tmp/notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists - skipping"
          else
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md
          fi
